<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Workflow Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #090b16;
        --bg-1: #131938;
        --surface: rgba(21, 28, 61, 0.7);
        --surface-2: rgba(18, 24, 52, 0.82);
        --stroke: rgba(154, 171, 255, 0.25);
        --text: #eef2ff;
        --muted: #aeb8e8;
        --primary: #ff6b35;
        --secondary: #4f7cff;
        --accent: #ffd23f;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, rgba(255, 107, 53, 0.24) 0%, transparent 40%),
          radial-gradient(circle at 80% 10%, rgba(79, 124, 255, 0.28) 0%, transparent 36%),
          radial-gradient(circle at 70% 85%, rgba(255, 210, 63, 0.16) 0%, transparent 42%),
          linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 100%);
        min-height: 100vh;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(at 27% 37%, hsla(215, 98%, 61%, 0.2) 0px, transparent 50%),
          radial-gradient(at 97% 21%, hsla(125, 98%, 72%, 0.08) 0px, transparent 50%),
          radial-gradient(at 52% 99%, hsla(354, 98%, 61%, 0.14) 0px, transparent 50%),
          radial-gradient(at 10% 29%, hsla(256, 96%, 67%, 0.13) 0px, transparent 50%);
        filter: blur(24px);
        z-index: -1;
      }

      .app {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 18px;
        max-width: 1260px;
        margin: 0 auto;
        padding: 22px;
        height: 100vh;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--stroke);
        border-radius: 18px;
        backdrop-filter: blur(12px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
        box-shadow:
          0 24px 48px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .panel-header {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(143, 162, 255, 0.2);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-header::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        box-shadow: 0 0 12px rgba(255, 107, 53, 0.8);
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bubble {
        max-width: 85%;
        padding: 11px 13px;
        border-radius: 14px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid transparent;
        animation: fadeInUp 0.25s ease;
      }

      .bubble.user {
        align-self: flex-end;
        background: linear-gradient(140deg, #3b56f6 0%, #5a40f5 100%);
        border-color: rgba(171, 180, 255, 0.4);
        box-shadow: 0 10px 26px rgba(59, 86, 246, 0.33);
      }

      .bubble.assistant {
        align-self: flex-start;
        background: linear-gradient(145deg, rgba(43, 57, 112, 0.9), rgba(34, 45, 92, 0.9));
        border-color: rgba(146, 166, 255, 0.25);
      }

      .bubble.system {
        align-self: center;
        background: rgba(255, 210, 63, 0.1);
        border-color: rgba(255, 210, 63, 0.35);
        color: #ffe8aa;
        font-size: 13px;
      }

      .composer {
        border-top: 1px solid rgba(143, 162, 255, 0.2);
        padding: 14px;
        display: grid;
        gap: 8px;
        background: var(--surface-2);
      }

      .row {
        display: flex;
        gap: 8px;
      }

      input,
      button {
        border: 1px solid rgba(150, 171, 255, 0.28);
        border-radius: 11px;
        background: rgba(14, 19, 43, 0.88);
        color: var(--text);
        padding: 10px;
        transition: all 0.2s ease;
        outline: none;
      }

      input:focus {
        border-color: rgba(255, 210, 63, 0.65);
        box-shadow: 0 0 0 3px rgba(255, 210, 63, 0.16);
      }

      #message {
        flex: 1;
      }

      .small {
        width: 120px;
      }

      button {
        background: linear-gradient(135deg, var(--primary), #ff8b4d);
        border-color: rgba(255, 207, 177, 0.5);
        cursor: pointer;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        letter-spacing: 0.01em;
        box-shadow: 0 10px 30px rgba(255, 107, 53, 0.26);
      }

      button:hover:not([disabled]) {
        transform: translateY(-1px);
        box-shadow: 0 14px 34px rgba(255, 107, 53, 0.35);
      }

      button[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .tool-list {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .tool-card {
        border: 1px solid rgba(169, 181, 255, 0.26);
        background: linear-gradient(145deg, rgba(24, 33, 73, 0.95), rgba(16, 23, 50, 0.95));
        border-radius: 14px;
        padding: 12px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 8px 20px rgba(0, 0, 0, 0.26);
        animation: fadeInUp 0.25s ease;
      }

      .tool-title {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        margin-bottom: 6px;
        color: #f2f5ff;
      }

      .tool-sub {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      pre {
        margin: 0;
        background: rgba(10, 14, 32, 0.95);
        border: 1px solid rgba(130, 149, 243, 0.2);
        border-radius: 8px;
        padding: 9px;
        font-size: 12px;
        overflow-x: auto;
        color: #d4dcff;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(148, 164, 255, 0.35);
        border-radius: 999px;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
          padding: 14px;
        }
        .panel {
          min-height: 44vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel">
        <div class="panel-header">Chat</div>
        <div id="messages" class="messages"></div>
        <form id="chat-form" class="composer">
          <div class="row">
            <input id="message" type="text" placeholder="Ask anything..." required />
            <button id="send-btn" type="submit">Send</button>
          </div>
          <div class="row">
            <input id="max-iterations" class="small" type="number" min="1" max="20" value="8" />
            <input id="file-root" type="text" value="." />
          </div>
          <div id="status" class="status">Ready</div>
        </form>
      </section>

      <aside class="panel">
        <div class="panel-header">Execution Trace</div>
        <div id="tool-calls" class="tool-list"></div>
      </aside>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const toolsEl = document.getElementById("tool-calls");
      const formEl = document.getElementById("chat-form");
      const messageInput = document.getElementById("message");
      const maxIterationsInput = document.getElementById("max-iterations");
      const fileRootInput = document.getElementById("file-root");
      const sendBtn = document.getElementById("send-btn");
      const statusEl = document.getElementById("status");

      let currentEventSource = null;
      let traceCounter = 0;
      let sessionId = localStorage.getItem("agentic_session_id") || "";

      function scrollToBottom(el) {
        el.scrollTop = el.scrollHeight;
      }

      function addBubble(role, text) {
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        div.textContent = text;
        messagesEl.appendChild(div);
        scrollToBottom(messagesEl);
      }

      function addTraceCard(kind, title, subtitle, payload) {
        traceCounter += 1;
        const card = document.createElement("div");
        card.className = "tool-card";

        const titleEl = document.createElement("div");
        titleEl.className = "tool-title";
        titleEl.textContent = `${traceCounter}. ${kind} — ${title}`;

        const subEl = document.createElement("div");
        subEl.className = "tool-sub";
        subEl.textContent = subtitle;

        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(payload, null, 2);

        card.appendChild(titleEl);
        card.appendChild(subEl);
        if (payload !== undefined && payload !== null) {
          card.appendChild(pre);
        }
        toolsEl.appendChild(card);
        scrollToBottom(toolsEl);
      }

      function setBusy(isBusy) {
        sendBtn.disabled = isBusy;
        messageInput.disabled = isBusy;
        maxIterationsInput.disabled = isBusy;
        fileRootInput.disabled = isBusy;
      }

      function resetForNextRun() {
        toolsEl.innerHTML = "";
        traceCounter = 0;
      }

      function handleStreamEvent(event) {
        if (!event || !event.type) {
          return;
        }

        if (event.type === "session") {
          if (event.session_id) {
            sessionId = String(event.session_id);
            localStorage.setItem("agentic_session_id", sessionId);
          }
          addTraceCard("Session", event.session_id || "unknown", "Conversation session started", null);
          return;
        }

        if (event.type === "plan") {
          if (Array.isArray(event.plan)) {
            addTraceCard(
              "Plan",
              "Task decomposition",
              "Planner output",
              event.plan.map((task, i) => ({ step: i + 1, task }))
            );
            return;
          }

          const step = event.step || "Plan step";
          const tool = event.tool ? ` | Tool: ${event.tool}` : "";
          addTraceCard("Plan", step, event.reason || `Next action${tool}`, event);
          return;
        }

        if (event.type === "route") {
          const route = event.route || {};
          addTraceCard(
            "Route",
            `Task ${event.task_index || "?"} → ${route.tool || "unknown"}`,
            route.reason || "Tool selected by router",
            route
          );
          return;
        }

        if (event.type === "execution") {
          const execution = event.execution || {};
          const route = execution.route || {};
          addTraceCard(
            "Execution",
            route.tool || "unknown",
            `Task: ${execution.task || ""}`,
            execution.tool_output || {}
          );
          return;
        }

        if (event.type === "tool_start") {
          addTraceCard(
            "Tool Start",
            event.tool || "unknown",
            `Iteration: ${event.iteration ?? "?"}`,
            event.input || {}
          );
          return;
        }

        if (event.type === "tool_result") {
          addTraceCard(
            "Tool Result",
            `${event.tool || "unknown"} (${event.status || "unknown"})`,
            event.output_preview || "",
            event.metadata || {}
          );
          return;
        }

        if (event.type === "verifier") {
          addTraceCard(
            "Verifier",
            event.status || "unknown",
            `confidence=${event.confidence ?? "n/a"} | goal_achieved=${event.goal_achieved ?? "n/a"}`,
            event
          );
          return;
        }

        if (event.type === "evaluation") {
          const evaluation = event.evaluation || {};
          addTraceCard(
            "Evaluation",
            evaluation.status || "unknown",
            evaluation.reason || "",
            evaluation
          );
          return;
        }

        if (event.type === "final") {
          const result = event.result || {};
          if (result.session_id) {
            sessionId = String(result.session_id);
            localStorage.setItem("agentic_session_id", sessionId);
          }
          const text = result.final_answer || event.reply || event.final_answer || "No final answer generated.";
          addBubble("assistant", text);
          statusEl.textContent = "Done";
          if (currentEventSource) {
            currentEventSource.close();
            currentEventSource = null;
          }
          setBusy(false);
          return;
        }

        if (event.type === "error") {
          addTraceCard("Error", "Workflow error", event.error || "Unknown error", event);
          addBubble("assistant", `I ran into an error: ${event.error || "Unknown error"}`);
          statusEl.textContent = "Error";
          if (currentEventSource) {
            currentEventSource.close();
            currentEventSource = null;
          }
          setBusy(false);
        }
      }

      formEl.addEventListener("submit", (event) => {
        event.preventDefault();

        const message = messageInput.value.trim();
        const maxIterations = Number(maxIterationsInput.value || 8);
        const fileRoot = (fileRootInput.value || ".").trim();

        if (!message) {
          return;
        }

        if (currentEventSource) {
          currentEventSource.close();
          currentEventSource = null;
        }

        addBubble("user", message);
        resetForNextRun();
        statusEl.textContent = "Running...";
        setBusy(true);

        const params = new URLSearchParams({
          message,
          max_iterations: String(maxIterations),
          file_root: fileRoot,
        });

        if (sessionId) {
          params.set("session_id", sessionId);
        }

        const streamUrl = `/chat/stream?${params.toString()}`;
        currentEventSource = new EventSource(streamUrl);

        currentEventSource.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            handleStreamEvent(data);
          } catch (err) {
            addTraceCard("Error", "Event parsing failed", String(err), { raw: msg.data });
          }
        };

        currentEventSource.onerror = () => {
          if (currentEventSource) {
            currentEventSource.close();
            currentEventSource = null;
          }
          statusEl.textContent = "Connection closed";
          setBusy(false);
        };

        messageInput.value = "";
      });

      statusEl.textContent = "Ready";
    </script>
  </body>
</html>
